name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r --filter @spendlens/web build
      - run: pnpm -r --filter @spendlens/web test

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spendlens_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/spendlens_test
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD_HASH: $argon2id$v=19$m=65536,t=3,p=4$placeholder
      JWT_SECRET: ci_secret_64chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      WEB_ORIGIN: http://localhost:5173
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          version: "0.5.0"
      - run: uv python install 3.12
        working-directory: apps/api
      - run: uv sync --frozen
        working-directory: apps/api
      - run: uv run alembic upgrade head
        working-directory: apps/api
      - run: uv run ruff check
        working-directory: apps/api
      - run: uv run pytest -v
        working-directory: apps/api
